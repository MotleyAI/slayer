site_name: SLayer
site_description: A lightweight semantic layer for AI agents
site_url: https://motley-slayer.readthedocs.io
repo_url: https://github.com/motleyai/slayer
repo_name: motleyai/slayer

theme:
  name: readthedocs
  logo: https://raw.githubusercontent.com/MotleyAI/slayer/refs/heads/main/docs/SLayer.png

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Terminology: concepts/terminology.md
      - Models: concepts/models.md
      - Queries: concepts/queries.md
      - Formulas: concepts/formulas.md
      - Auto-Ingestion: concepts/ingestion.md
  - Interfaces:
      - MCP Server: interfaces/mcp.md
      - REST API: interfaces/rest-api.md
      - Python Client: interfaces/python-client.md
      - CLI: interfaces/cli.md
  - Examples:
      - Dynamic Models: examples/01_dynamic/dynamic.md
      - SQL vs DSL:
          - examples/02_sql_vs_dsl/sql_vs_dsl.md
          - Notebook: examples/02_sql_vs_dsl/sql_vs_dsl_nb.ipynb
      - Auto-Ingestion:
          - examples/03_auto_ingest/auto_ingest.md
          - Notebook: examples/03_auto_ingest/auto_ingest_nb.ipynb
      - Time Dimensions:
          - examples/04_time/time.md
          - Notebook: examples/04_time/time_nb.ipynb
      - Joins:
          - examples/05_joins/joins.md
          - Notebook: examples/05_joins/joins_nb.ipynb
      - Joined Measures:
          - examples/05_joined_measures/joined_measures.md
          - Notebook: examples/05_joined_measures/joined_measures_nb.ipynb
      - Multistage Queries:
          - examples/06_multistage_queries/multistage_queries.md
          - Notebook: examples/06_multistage_queries/multistage_queries_nb.ipynb
  - Configuration:
      - Datasources: configuration/datasources.md
      - Storage Backends: configuration/storage.md
  - Development: development.md

plugins:
  - search
  - section-index
  - mkdocs-jupyter:
      include_source: true
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true
