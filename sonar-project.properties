# SonarCloud configuration (DEV-1564).
#
# Required so the project key resolves the same way locally as in
# SonarCloud, and so we can carry exclusions in-repo.

sonar.projectKey=MotleyAI_slayer
sonar.organization=motleyai

# Copy-Paste Detector exclusions (the SonarQube-canonical equivalent of
# NOSONAR for the duplication gate — CPD has no per-line suppression form).
#
# DEV-1564: the three per-dialect integration test files are by-design
# mirrors of `tests/integration/test_integration_postgres.py` plus
# dialect-specific tweaks (DDL syntax, type narrowing, NotImplementedError
# expectations, etc.). The duplication is intentional — extracting the
# shared bits into a helper would tangle dialect concerns without changing
# the per-dialect specifics. Suppress at the file level.
sonar.cpd.exclusions=tests/integration/test_integration_mysql.py,tests/integration/test_integration_clickhouse.py,tests/integration/test_integration_sqlserver.py
