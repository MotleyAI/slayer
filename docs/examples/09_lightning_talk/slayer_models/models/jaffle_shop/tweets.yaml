version: 7
name: tweets
sql_table: tweets
query_variables: {}
data_source: jaffle_shop
columns:
- name: id
  sql: id
  type: TEXT
  primary_key: true
  label: Tweet ID
  hidden: false
- name: user_id
  sql: user_id
  type: TEXT
  primary_key: false
  description: Customer who tweeted.
  label: Customer ID
  hidden: false
- name: tweeted_at
  sql: tweeted_at
  type: DATE
  primary_key: false
  description: When the tweet was posted.
  label: Tweet Date
  hidden: false
- name: content
  sql: content
  type: TEXT
  primary_key: false
  description: Tweet text.
  label: Tweet
  hidden: false
measures:
- formula: id:count
  name: tweet_count
  label: Tweets
  description: Number of tweets.
  type: INT
aggregations: []
joins:
- target_model: customers
  join_pairs:
  - - user_id
    - id
  join_type: left
filters: []
default_time_dimension: tweeted_at
description: Synthetic customer tweets mentioning the Jaffle Shop.
hidden: false
