version: 7
name: items
sql_table: items
query_variables: {}
data_source: jaffle_shop
columns:
- name: id
  sql: id
  type: TEXT
  primary_key: true
  label: Item ID
  hidden: false
- name: order_id
  sql: order_id
  type: TEXT
  primary_key: false
  description: Order this line belongs to.
  label: Order
  hidden: false
- name: sku
  sql: sku
  type: TEXT
  primary_key: false
  description: Product sold on this line.
  label: Product
  hidden: false
measures:
- formula: id:count
  name: units_sold
  label: Units Sold
  description: Number of item units sold.
  type: INT
aggregations: []
joins:
- target_model: orders
  join_pairs:
  - - order_id
    - id
  join_type: left
- target_model: products
  join_pairs:
  - - sku
    - sku
  join_type: left
filters: []
description: "Order line items \u2014 one row per unit sold on an order."
hidden: false
